<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colloc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=Space+Grotesk:wght@600;700&family=Poppins:wght@800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:          #0d0d0f;
      --border:      rgba(255,255,255,0.07);
      --text-primary:#f0ede8;
      --text-muted:  #7a7871;
      --text-sub:    #a8a49c;
      --btn-bg:      #f0ede8;
      --btn-text:    #0d0d0f;
      --radius:      10px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-size: 128px 128px;
      opacity: 0.025;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse at center, rgba(220,210,190,0.045) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 40px;
    }

    header {
      position: relative;
      z-index: 2;
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-wordmark {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 2rem;
      font-weight: 800;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: -0.04em;
      line-height: 1;
      display: inline-block;
    }

    main {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
    }

    .hero-eyebrow {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hero-eyebrow::before,
    .hero-eyebrow::after {
      content: '';
      display: block;
      width: 24px;
      height: 1px;
      background: var(--border);
    }

    .hero-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.8rem, 6.5vw, 5.2rem);
      font-weight: 400;
      line-height: 1.06;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    .hero-title em {
      font-style: italic;
      color: var(--text-sub);
    }

    .hero-desc {
      font-size: clamp(0.85rem, 1.2vw, 1rem);
      font-weight: 300;
      line-height: 1.7;
      color: var(--text-sub);
      max-width: 460px;
      margin-bottom: 36px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 30px;
      background: var(--btn-bg);
      color: var(--btn-text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      border-radius: var(--radius);
      text-decoration: none;
    }

    .btn-primary svg {
      width: 13px;
      height: 13px;
    }

    footer {
      position: relative;
      z-index: 1;
      padding: 20px 0;
      border-top: 1px solid var(--border);
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .footer-copy {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    .footer-links {
      display: flex;
      gap: 20px;
    }

    .footer-links a {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 0.03em;
    }

    .footer-links a:hover {
      color: var(--text-sub);
    }
  </style>
</head>
<body>

  <header>
    <div class="wrapper">
      <div class="header-inner">
        <a href="#" aria-label="Colloc home" class="logo-wordmark">
          colloc
        </a>
        <span style="font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);">Coming Soon · July 2026</span>
      </div>
    </div>
  </header>

  <main>
    <div class="wrapper">
      <section class="hero">

        <p class="hero-eyebrow">Student housing, reimagined</p>

        <h1 class="hero-title">
          Find your people.<br><em>Find your home.</em>
        </h1>

        <p class="hero-desc">
          Home isn't just four walls.<br>It's who you share them with.
        </p>

        <a href="#" id="waitlist-btn" class="btn-primary">
          Join Waitlist
        </a>

      </section>
    </div>
  </main>

  <footer>
    <div class="wrapper">
      <div class="footer-inner">
        <span class="footer-copy">© 2026 Colloc. All rights reserved.</span>
        <nav class="footer-links">
          <a href="#" id="contact-link">Contact</a>
        </nav>
      </div>
    </div>
  </footer>

  <script>
    const CONTACT_EMAIL = 'contact@colloc.ma';

    document.getElementById('contact-link').addEventListener('click', function (e) {
      e.preventDefault();
      window.location.href = 'mailto:' + CONTACT_EMAIL + '?subject=Hello%20Colloc';
    });
  </script>

</body>
</html>
